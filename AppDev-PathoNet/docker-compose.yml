version: '3.8'

services:
  pathonet-api:
    build: .
    container_name: pathonet-api
    ports:
      - "5000:5000"
    volumes:
      - ./models:/app/models
      - ./.pathonet_cache.json:/app/.pathonet_cache.json
    restart: unless-stopped
    environment:
      - PORT=5000
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health/v2', timeout=5)" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - pathonet-network

networks:
  pathonet-network:
    driver: bridge
